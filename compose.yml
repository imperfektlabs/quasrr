# Docker Compose for Quasrr
# Unified media search and download management

# --- YAML Anchor for Common Configuration ---
x-common-config: &common-config
  env_file:
    - ./.env
  networks:
    - net-media
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "5"

# Strict bind-mount policy: fail if host source path is missing.
x-bind-strict: &bind-strict
  type: bind
  bind:
    create_host_path: false

# --- Service Definitions ---
services:
  # -------------------------------------------------------------------
  # Backend Service (FastAPI)
  # -------------------------------------------------------------------
  backend:
    <<: *common-config
    build: ./backend
    container_name: ${COMPOSE_PROJECT_NAME}-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - <<: *bind-strict
        source: ${PROJECT_ROOT_PATH:-.}/data
        target: /app/data
      - <<: *bind-strict
        source: ${PROJECT_ROOT_PATH:-.}/config
        target: /app/config
      - <<: *bind-strict
        source: ${PROJECT_ROOT_PATH:-.}/logs
        target: /app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # -------------------------------------------------------------------
  # Frontend Service (Next.js)
  # -------------------------------------------------------------------
  frontend:
    <<: *common-config
    build: ./frontend
    container_name: ${COMPOSE_PROJECT_NAME}-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# ===================================================================
# NETWORK DEFINITION
# ===================================================================
networks:
  net-media:
    name: net-media
    external: true
