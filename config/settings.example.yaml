# --- Quality Preferences ---
# Adjust based on your storage/bandwidth preferences
quality:
  tv:
    hour_episode:
      min_size_mb: 800
      max_size_mb: 1200
    half_hour_episode:
      min_size_mb: 400
      max_size_mb: 500
  movies:
    min_size_mb: 2000
    max_size_mb: 4000

# --- Feature Flags ---
features:
  show_download_always: false
  ai_suggestions: true
  auto_quality_filter: true

# --- Dashboard Cards ---
dashboard:
  show_sonarr: true
  show_radarr: true
  show_sabnzbd: true
  show_plex: false
