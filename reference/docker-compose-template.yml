# Docker Compose Template for Shiny-Palm-Tree
# Based on proven patterns from media-stack configuration

# --- YAML Anchor for Common Configuration ---
x-common-config: &common-config
  # Environment Variables: Loaded from the external .env file
  env_file:
    - ./shiny-palm-tree.env
  
  # Default Networks: Connects this service to our custom network
  networks:
    - net-shiny-palm-tree
  
  # Restart policy and logging limits for disk safety
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "5"

# --- Service Definitions ---
services:
  # -------------------------------------------------------------------
  # Backend Service (FastAPI)
  # -------------------------------------------------------------------
  backend:
    <<: *common-config # Apply common configuration block
    build: ./backend
    container_name: ${COMPOSE_PROJECT_NAME}-backend
    
    # Port Mappings:
    ports:
      - "${BACKEND_PORT:-8000}:8000"

    # Volumes: Using the centralized paths
    volumes:
      - ${PROJECT_ROOT_PATH}/data:/app/data
      - ${PROJECT_ROOT_PATH}/config:/app/config
      - ${PROJECT_ROOT_PATH}/logs:/app/logs
    
    # Healthchecks: Ensures the service is fully operational
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # -------------------------------------------------------------------
  # Frontend Service (Next.js)
  # -------------------------------------------------------------------
  frontend:
    <<: *common-config # Apply common configuration block
    build: ./frontend
    container_name: ${COMPOSE_PROJECT_NAME}-frontend
    depends_on:
      - backend
    
    # Port Mappings:
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
      
    # Healthchecks: Ensures the service is responsive
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# ===================================================================
# NETWORK DEFINITION
# ===================================================================
networks:
  net-shiny-palm-tree: 
    driver: bridge
    name: net-${COMPOSE_PROJECT_NAME}

# ===================================================================
# VOLUME DEFINITIONS
# Volumes are external for persistence.
# ===================================================================
volumes:
  backend_data: 
    external: true
  backend_config: 
    external: true